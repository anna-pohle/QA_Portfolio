[pytest]

pythonpath = .

testpaths = tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    smoke: Smoke tests - quick, critical base tests
    regression: Regression tests - full test coverage
    feature_pim: PIM (Employee Management) feature tests
    feature_leave: Leave Management feature tests
    feature_login: Login feature tests

# Live logging for linear output
# Change log level here centrally: DEBUG, INFO, WARNING, ERROR
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s - %(levelname)s - %(message)s
log_cli_date_format = %H:%M:%S

addopts =
    -v
    --junitxml=test-results/junit.xml
    --reruns=1
    --reruns-delay=2
